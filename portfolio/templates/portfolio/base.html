{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tejas Sreepathy - Portfolio{% endblock %}</title>
    <meta name="description" content="Portfolio of Tejas Sreepathy, a passionate developer." />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="{% static 'portfolio/css/style.css' %}">
</head>
<body>

    <!-- Header/Nav -->
    <header class="navbar">
        <div class="nav-container">
            <a href="{% url 'index' %}" class="logo">Tejas<span></span></a>
            <div class="menu-toggle" id="mobile-menu">
                <i class="ph ph-list"></i>
            </div>
            <nav class="nav-links">
                <a href="{% url 'about' %}" class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}">About</a>
                <a href="{% url 'skills' %}" class="nav-link {% if request.resolver_match.url_name == 'skills' %}active{% endif %}">Skills</a>
                <a href="{% url 'projects' %}" class="nav-link {% if request.resolver_match.url_name == 'projects' %}active{% endif %}">Projects</a>
                <a href="{% url 'education' %}" class="nav-link {% if request.resolver_match.url_name == 'education' %}active{% endif %}">Education</a>
                <a href="{% url 'contact' %}" class="nav-link btn-hire">Contact Me</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <p>Built with ❤️ by Tejas Sreepathy</p>
    </footer>

    <!-- Scripts -->
    <script src="{% static 'portfolio/js/script.js' %}"></script>
</body>
</html>
