            <div style="text-align: left;">
                <h4 style="margin-bottom: 0.5rem; font-size: 1.1rem;">Top 10% Ranking</h4>
                <p style="color: grey; font-size: 0.95rem;">TryHackMe and Hack The Box (Sep '25)</p>
